# ABOUTME: Keyless deploy to Cloud Run on push to main, via Workload Identity Federation.
# ABOUTME: Secrets referenced by PINNED version; bumping a secret is a deliberate edit here.

name: deploy
on:
  push:
    branches: [main]

env:
  REGION: europe-west1
  SERVICE: cadenza

jobs:
  deploy:
    # Gated until the GCP project exists: enable with
    #   gh variable set DEPLOY_ENABLED --body true
    # A skipped deploy keeps main green; a red one trains everyone to
    # ignore failures on the branch that matters.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/github
          service_account: cadenza-deploy@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v3
      - name: Build and push image
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
          IMAGE=${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/cadenza/cadenza:${GITHUB_SHA::12}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --service-account=cadenza-run@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com
            --allow-unauthenticated
            --min-instances=0 --max-instances=1
            --timeout=600 --memory=512Mi --cpu-boost
          env_vars: |
            ENV=prod
            GCP_PROJECT=${{ secrets.GCP_PROJECT }}
            ATHLETE_TZ=Europe/Rome
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            EXECUTOR_AUDIENCE=${{ secrets.SERVICE_URL }}
            INVOKER_EMAIL=cadenza-invoker@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com
            TASKS_QUEUE_PATH=projects/${{ secrets.GCP_PROJECT }}/locations/europe-west1/queues/cadenza-exec
          secrets: |
            TELEGRAM_BOT_TOKEN=cadenza-telegram-bot-token:1
            TELEGRAM_WEBHOOK_SECRET=cadenza-telegram-webhook-secret:1
            ICU_API_KEY=cadenza-icu-api-key:1
