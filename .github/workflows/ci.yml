# ABOUTME: CI gate on PRs and dev: lint, vet, fmt, vuln, race tests, e2e, emulator suite.
# ABOUTME: REQUIRE_EMULATOR=1 turns silent emulator skips into failures (no hollow gates).

name: ci
on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      # GitHub service containers cannot run a custom command, and the
      # emulators image does not start Firestore by default; a plain step
      # mirrors the local `make emulator` exactly.
      - name: Start Firestore emulator
        run: |
          docker run -d --name firestore-emu -p 8090:8090 \
            gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators \
            gcloud emulators firestore start --host-port=0.0.0.0:8090
          for i in $(seq 1 60); do
            docker logs firestore-emu 2>&1 | grep -q "running" && break
            sleep 2
          done
          docker logs firestore-emu 2>&1 | tail -2
      - name: make check
        run: make check
      - name: make test-e2e
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8090
          REQUIRE_EMULATOR: "1"
        run: make test-e2e
      - name: Emulator suite
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8090
          REQUIRE_EMULATOR: "1"
        run: go test -race -count=1 ./internal/store/...
